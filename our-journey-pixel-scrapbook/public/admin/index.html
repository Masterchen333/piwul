<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitation Generator</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/stardew-ui.css" />
  </head>

  <body>
    <main class="world">
      <div class="content">
        <section class="section pixel-box">
          <h2>INVITATION GENERATOR</h2>

          <input id="guestName" type="text" placeholder="Nama tamu" />

          <input id="guestPhone" type="text" placeholder="Nomor WA: 628xxxx" />

          <button class="pixel-btn" id="generateBtn" type="button">
            GENERATE LINK
          </button>

          <div class="guest-list" id="resultBox"></div>
        </section>

        <section class="section pixel-box">
          <h2>GUEST DASHBOARD</h2>
          <div class="guest-list" id="dashboardBox"></div>
        </section>
      </div>
    </main>

    <script src="./admin.js?v=10"></script>
  </body>
</html>
