<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow, noarchive" />

    <title>Piwul Invitation Admin</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/stardew-ui.css" />
  </head>

  <body class="admin-page">
    <main class="admin-world" id="adminWorld">
      <div class="admin-content">
        <div class="admin-topbar">
          <h1>🌸 PIWUL ADMIN</h1>
        </div>

        <section class="admin-panel pixel-box">
          <h2>🌸 INVITATION GENERATOR 🌸</h2>

          <div class="admin-input-wrap">
            <span>👤</span>
            <input id="guestName" type="text" placeholder="Nama tamu" />
          </div>

          <div class="admin-input-wrap">
            <span>📱</span>
            <input
              id="guestPhone"
              type="text"
              placeholder="Nomor WA: 628xxxx"
            />
          </div>

          <button
            class="pixel-btn admin-generate-btn"
            id="generateBtn"
            type="button"
          >
            GENERATE LINK 🤍
          </button>

          <div class="guest-list" id="resultBox"></div>
        </section>

        <section class="admin-panel pixel-box">
          <h2>🌸 GUEST DASHBOARD 🌸</h2>

          <div class="admin-tools">
            <div class="admin-search-wrap">
              <span>🔍</span>
              <input
                id="searchGuest"
                type="text"
                placeholder="Search guest..."
              />
            </div>

            <select id="filterGuest">
              <option value="all">All</option>
              <option value="opened">Opened</option>
              <option value="not-opened">Not Opened</option>
              <option value="attending">Attending</option>
              <option value="declined">Declined</option>
              <option value="pending">Pending RSVP</option>
            </select>
          </div>

          <div class="guest-list admin-dashboard-list" id="dashboardBox"></div>
        </section>
      </div>
    </main>

    <script src="./admin.js?v=1"></script>
  </body>
</html>
